<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Eventos</h1>
    <ul id="lista"></ul>
    
<script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script>
        let eventos=[
            {titulo:"JS", cupo:10},
            {titulo:"Synfony", cupo:0},
            {titulo:"PHP", cupo:5}
        ];

        $(`#lista`).html("");

        eventos.forEach(e=>{
            if(e.cupo>0){
            $(`#lista`).append(`<li>${e.titulo}- cupo: ${e.cupo}</li>`);
            }
        });
 
    </script>

</body>
</html>
